<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monster Challenge Pro</title>
    <style>
        body { background: #121212; color: white; margin: 0; font-family: 'Georgia', serif; overflow: hidden; }
        .top-bar { height: 50px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid #f1c40f; }
        #timer-box { font-size: 20px; font-weight: bold; color: #e74c3c; }
        
        #game-view { height: calc(100vh - 150px); display: flex; justify-content: center; align-items: center; position: relative; background: #2c3e50; }
        #map-container { 
            position: relative; width: 850px; aspect-ratio: 1012 / 654; 
            background: url('/static/images/map_static.png') no-repeat center; 
            background-size: 100% 100%; border: 5px solid #444; 
        }
        
        .grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(5, 1fr); }
        .cell { display: flex; justify-content: center; align-items: center; }
        
        #player { width: 60px; z-index: 10; filter: drop-shadow(0 0 10px #fff); transition: all 0.3s; }
        #opponent { width: 50px; z-index: 9; opacity: 0.7; filter: grayscale(1); display: none; }

        /* 弹窗样式 */
        #modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        #game-modal { background: #000; border: 4px solid #f1c40f; padding: 30px; border-radius: 15px; text-align: center; width: 400px; }
        #modal-text { font-size: 24px; font-weight: bold; font-style: italic; margin-bottom: 20px; color: #f1c40f; }
        #modal-input { width: 80%; padding: 10px; font-size: 20px; margin-bottom: 15px; text-align: center; }
        
        .footer { height: 100px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid #f1c40f; }
        .stat { text-align: center; font-weight: bold; }
        .btn { background: #f1c40f; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="timer-box">TIME: <span id="countdown">10</span>s</div>
        <div>MODE: <span id="current-mode">SINGLE</span></div>
    </div>

    <div id="game-view">
        <div id="modal-overlay">
            <div id="game-modal">
                <div id="modal-text">Question</div>
                <input type="number" id="modal-input" placeholder="Type answer...">
                <button id="modal-submit" class="btn">SUBMIT</button>
            </div>
        </div>

        <div id="map-container">
            <div class="grid-layer">
                <div id="player-box" class="cell" style="grid-column: 1; grid-row: 5;"><img src="/static/images/player.png" id="player"></div>
                <div id="opponent-box" class="cell" style="grid-column: 1; grid-row: 5;"><img src="/static/images/player.png" id="opponent"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="stat">SCORE<br><span id="score" style="color:#f1c40f; font-size:24px;">100</span></div>
        <button id="roll-btn" class="btn" style="background:#e74c3c; color:white;">ROLL DICE</button>
        <button id="robot-toggle" class="btn">VS ROBOT: OFF</button>
        <div id="dice-result" style="font-size:30px;">🎲</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/static/game.js"></script>
</body>
</html>
