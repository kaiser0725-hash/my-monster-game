<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11+ Monster Challenge</title>
    <style>
        body { background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }
        .header { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 3px solid #f1c40f; font-weight: bold; }
        #game-view { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: #2c3e50; position: relative; }
        
        /* 地图容器 - 对应你的 map_static 图片 */
        #map-container { 
            position: relative; width: 850px; aspect-ratio: 1012 / 654; 
            background: url('/static/images/map_static.png') no-repeat center; 
            background-size: 100% 100%; border: 5px solid #444; 
        }
        
        .grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(5, 1fr); }
        .cell { display: flex; justify-content: center; align-items: center; }
        #player { width: 70%; height: 70%; object-fit: contain; z-index: 10; filter: drop-shadow(0 0 10px #fff); transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        /* 斜体加粗大弹窗 */
        #modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #game-modal { background: linear-gradient(135deg, #2c3e50, #000); border: 4px solid #f1c40f; padding: 40px; border-radius: 20px; max-width: 600px; width: 85%; text-align: center; box-shadow: 0 0 30px #f1c40f; }
        #modal-text { font-size: 30px; font-weight: bold; font-style: italic; margin-bottom: 25px; line-height: 1.4; color: #fff; text-shadow: 2px 2px #000; }
        #modal-input { width: 60%; padding: 15px; font-size: 24px; border-radius: 8px; border: none; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .modal-btn { background: #f1c40f; color: #000; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }

        /* 侧边图鉴 */
        #collection-drawer { position: absolute; right: -350px; top: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.95); border-left: 3px solid #f1c40f; z-index: 500; transition: 0.5s; padding: 20px; overflow-y: auto; }
        #collection-drawer.open { right: 0; }
        .monster-card { background: #333; margin-bottom: 15px; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #555; }
        .monster-card img { width: 80px; height: 80px; object-fit: contain; }

        .footer { height: 100px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 4px solid #f1c40f; }
        .stat-value { font-size: 24px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="header"><span>CITY OF LONDON SCHOOL CHALLENGE</span></div>
    <div id="game-view">
        <div id="modal-overlay">
            <div id="game-modal">
                <div id="modal-text">Question</div>
                <input type="text" id="modal-input" autocomplete="off"><br>
                <button id="modal-submit" class="modal-btn">SUBMIT</button>
            </div>
        </div>
        <div id="collection-drawer">
            <h2 style="color:#f1c40f; text-align:center;">MY POCKET</h2>
            <div id="monster-list"></div>
            <button onclick="document.getElementById('collection-drawer').classList.remove('open')" class="modal-btn" style="width:100%; margin-top:20px;">CLOSE</button>
        </div>
        <div id="map-container">
            <div class="grid-layer">
                <div id="player-box" class="cell"><img src="/static/images/player.png" id="player"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div style="text-align:center">SCORE<br><span id="score" class="stat-value">100</span></div>
        <button onclick="document.getElementById('collection-drawer').classList.add('open')" style="padding:10px 20px; cursor:pointer; font-weight:bold;">COLLECTION</button>
        <button id="roll-btn" style="padding:15px 30px; font-size:18px; cursor:pointer; font-weight:bold; background:#e74c3c; color:white; border:none; border-radius:5px;">ROLL DICE</button>
        <div id="dice-ui" style="font-size: 40px;">🎲</div>
    </div>
    <script src="/static/game.js"></script>
</body>
</html>
